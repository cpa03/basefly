name: CodeQL Security Analysis
# Performs semantic code analysis to find security vulnerabilities.
# Implements Issue #728 - Missing security scanning workflows in CI.
#
# DEPLOYMENT INSTRUCTIONS:
# Copy this file to .github/workflows/codeql-analysis.yml and push.
# Requires GITHUB_TOKEN with `workflows: write` permission.
# Alternatively, use a Personal Access Token (PAT) with `workflows` scope.
#
# Uses the project's CodeQL configuration at .github/codeql-config.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1" # Weekly on Monday at 03:00 UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql-config.yml
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
