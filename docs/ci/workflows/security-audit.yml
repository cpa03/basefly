name: security-audit

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  pull_request:
    paths:
      - 'pnpm-lock.yaml'
      - '**/package.json'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm Audit
        run: pnpm audit --audit-level=high || true
        continue-on-error: true
        id: pnpm-audit

      - name: Run pnpm Audit for JSON Report
        if: always()
        run: |
          pnpm audit --audit-level=high --json 2>/dev/null > pnpm-audit-report.json || true

      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit-report
          path: pnpm-audit-report.json
          retention-days: 14
          if-no-files-found: ignore

  outdated:
    name: Outdated Dependency Check
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Check Outdated Dependencies
        run: pnpm outdated --long || true
        continue-on-error: true
